<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: transparent;
      overflow: hidden;
      padding: 8px;
      width: 340px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 18px;
      padding: 16px 18px 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: pop 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Status row */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rec-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .rec-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #111;
      animation: blink 0.9s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .rec-label {
      font-size: 11px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .timer {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }

    /* Waveform — simple bars */
    .waveform {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 28px;
    }
    .wbar {
      width: 2px;
      border-radius: 2px;
      background: #111;
      transition: height 0.08s ease;
    }

    /* Live translation */
    .live-text {
      font-size: 13px;
      line-height: 1.55;
      color: #333;
      min-height: 20px;
      text-align: center;
    }
    .live-placeholder {
      color: #ccc;
      font-style: italic;
      font-size: 12px;
    }

    /* Hint */
    .hint {
      font-size: 10px;
      color: #ccc;
      text-align: center;
    }
    kbd {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 9px;
      font-family: inherit;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-row">
      <div class="rec-badge">
        <div class="rec-dot"></div>
        <span class="rec-label">Recording</span>
      </div>
      <span class="timer" id="timer">0:00</span>
    </div>

    <div class="waveform" id="waveform"></div>

    <div class="live-text" id="liveText">
      <span class="live-placeholder">Listening…</span>
    </div>

    <div class="hint">Click <kbd>Speak</kbd> or press <kbd>⌘⇧Space</kbd> to stop</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // Build waveform bars
    const wf = document.getElementById('waveform');
    const N = 40;
    for (let i = 0; i < N; i++) {
      const b = document.createElement('div');
      b.className = 'wbar';
      b.style.height = '3px';
      wf.appendChild(b);
    }
    const bars = wf.querySelectorAll('.wbar');

    // Animate bars
    setInterval(() => {
      bars.forEach(b => {
        b.style.height = Math.max(2, Math.round(Math.random() * 24 + 3)) + 'px';
      });
    }, 80);

    // Timer
    let sec = 0;
    const timerEl = document.getElementById('timer');
    setInterval(() => {
      sec++;
      timerEl.textContent = `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
    }, 1000);

    // Live translation from main
    ipcRenderer.on('live-transcript', (_, text) => {
      const el = document.getElementById('liveText');
      if (text?.trim()) el.textContent = text;
    });
  </script>
</body>
</html>
