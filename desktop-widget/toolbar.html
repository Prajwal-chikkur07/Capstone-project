<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 8px 10px;
    }

    .dock {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
    }

    .divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.08);
      margin: 0 4px;
    }

    .action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 14px;
      transition: background 0.15s ease, transform 0.15s ease;
      min-width: 60px;
    }

    .action:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    .action:active { transform: translateY(0); }

    .action.restore:hover { background: rgba(239,68,68,0.12); }

    .icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action:nth-child(1) .icon-wrap { background: rgba(99,102,241,0.18); }
    .action:nth-child(2) .icon-wrap { background: rgba(16,185,129,0.15); }
    .action:nth-child(3) .icon-wrap { background: rgba(245,158,11,0.15); }
    .action.restore .icon-wrap { background: rgba(239,68,68,0.12); }

    .label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .action:hover .label { color: rgba(255,255,255,0.85); }
  </style>
</head>
<body>
  <div class="dock">
    <button class="action" id="btnTranslate">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
          <path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/>
        </svg>
      </div>
      <span class="label">Translate</span>
    </button>

    <button class="action" id="btnSelection">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
        </svg>
      </div>
      <span class="label">Selection</span>
    </button>

    <button class="action" id="btnClick">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3l-6 9h7l-2 9 12-12h-7l2-6z"/>
        </svg>
      </div>
      <span class="label">Click</span>
    </button>

    <div class="divider"></div>

    <button class="action restore" id="btnRestore">
      <div class="icon-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </div>
      <span class="label">Restore</span>
    </button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    document.getElementById('btnTranslate').addEventListener('click', () => {
      ipcRenderer.send('open-overlay', 'translate');
    });
    document.getElementById('btnSelection').addEventListener('click', () => {
      ipcRenderer.send('open-overlay', 'selection');
    });
    document.getElementById('btnClick').addEventListener('click', () => {
      ipcRenderer.send('open-overlay', 'click');
    });
    document.getElementById('btnRestore').addEventListener('click', () => {
      ipcRenderer.send('open-overlay', 'restore');
    });
  </script>
</body>
</html>
