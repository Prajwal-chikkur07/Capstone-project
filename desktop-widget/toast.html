<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      overflow: hidden;
      padding: 8px 10px;
    }

    .toast {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      animation: slideUp 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.loading { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
    .dot.result  { background: #6366f1; }
    .dot.success { background: #10b981; }
    .dot.error   { background: #ef4444; }
    .dot.info    { background: #111; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .content { flex: 1; min-width: 0; }

    .label {
      font-size: 9px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 2px;
    }

    .message {
      font-size: 12px;
      line-height: 1.5;
      color: #111;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .action-btn {
      border: none;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.12s;
      white-space: nowrap;
    }

    .copy-btn {
      background: #f0f0f0;
      color: #555;
      display: none;
    }
    .copy-btn.visible { display: inline-block; }
    .copy-btn:hover { background: #e0e0e0; }
    .copy-btn.copied { color: #10b981; background: rgba(16,185,129,0.1); }

    .stop-btn {
      background: rgba(239,68,68,0.08);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.15);
      display: none;
      align-items: center;
      gap: 5px;
    }
    .stop-btn.visible { display: inline-flex; }
    .stop-btn:hover { background: rgba(239,68,68,0.15); }

    .dismiss-btn {
      width: 22px; height: 22px;
      border: none;
      border-radius: 6px;
      background: #f5f5f5;
      color: #bbb;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .dismiss-btn:hover { background: #eee; color: #555; }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="dot" id="dot"></div>
    <div class="content">
      <div class="label" id="label"></div>
      <div class="message" id="message"></div>
    </div>
    <div class="actions">
      <button class="action-btn copy-btn" id="copyBtn">Copy</button>
      <button class="action-btn stop-btn" id="stopBtn">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="dismiss-btn" id="dismissBtn">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const dot = document.getElementById('dot');
    const label = document.getElementById('label');
    const msg = document.getElementById('message');
    const copyBtn = document.getElementById('copyBtn');
    const stopBtn = document.getElementById('stopBtn');
    const dismissBtn = document.getElementById('dismissBtn');

    const LABELS = { loading: 'Working', result: 'Translation', success: 'Done', error: 'Error', info: '' };

    ipcRenderer.on('toast-data', (_, data) => {
      dot.className = 'dot ' + data.type;
      label.textContent = LABELS[data.type] || '';
      msg.textContent = data.message || '';

      // Copy button — show on result
      if (data.type === 'result') {
        copyBtn.classList.add('visible');
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(data.message).then(() => {
            copyBtn.textContent = '✓ Copied';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
          });
        };
      } else {
        copyBtn.classList.remove('visible');
      }

      // Stop button — show when page translation is loading or info (click mode active)
      if (data.type === 'loading' || data.type === 'info') {
        stopBtn.classList.add('visible');
      } else {
        stopBtn.classList.remove('visible');
      }
    });

    stopBtn.addEventListener('click', () => {
      ipcRenderer.send('ext-action', { type: 'STOP_TRANSLATION' });
      ipcRenderer.send('hide-toast');
    });

    dismissBtn.addEventListener('click', () => {
      ipcRenderer.send('hide-toast');
    });
  </script>
</body>
</html>
