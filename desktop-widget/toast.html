<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      overflow: hidden;
      padding: 8px 10px;
    }

    .toast {
      background: rgba(10, 12, 20, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 10px 12px 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      animation: slideUp 0.22s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.loading { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.6); animation: pulse 1s ease-in-out infinite; }
    .dot.result  { background: #818cf8; box-shadow: 0 0 6px rgba(129,140,248,0.6); }
    .dot.success { background: #34d399; box-shadow: 0 0 6px rgba(52,211,153,0.6); }
    .dot.error   { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.6); }
    .dot.info    { background: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.6); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .content { flex: 1; min-width: 0; }

    .label {
      font-size: 9px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 2px;
    }

    .message {
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.85);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .action-btn {
      border: none;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .copy-btn {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.4);
      display: none;
    }
    .copy-btn.visible { display: inline-block; }
    .copy-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .copy-btn.copied { color: #6ee7b7; background: rgba(16,185,129,0.12); }

    .stop-btn {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      display: none;
      align-items: center;
      gap: 5px;
    }
    .stop-btn.visible { display: inline-flex; }
    .stop-btn:hover { background: rgba(239,68,68,0.22); color: #fca5a5; }

    .dismiss-btn {
      width: 22px; height: 22px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .dismiss-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="dot" id="dot"></div>
    <div class="content">
      <div class="label" id="label"></div>
      <div class="message" id="message"></div>
    </div>
    <div class="actions">
      <button class="action-btn copy-btn" id="copyBtn">Copy</button>
      <button class="action-btn stop-btn" id="stopBtn">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Stop
      </button>
      <button class="dismiss-btn" id="dismissBtn">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const dot = document.getElementById('dot');
    const label = document.getElementById('label');
    const msg = document.getElementById('message');
    const copyBtn = document.getElementById('copyBtn');
    const stopBtn = document.getElementById('stopBtn');
    const dismissBtn = document.getElementById('dismissBtn');

    const LABELS = { loading: 'Translating', result: 'Translation', success: 'Done', error: 'Error', info: 'Active' };

    ipcRenderer.on('toast-data', (_, data) => {
      dot.className = 'dot ' + data.type;
      label.textContent = LABELS[data.type] || '';
      msg.textContent = data.message || '';

      // Copy button — show on result
      if (data.type === 'result') {
        copyBtn.classList.add('visible');
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(data.message).then(() => {
            copyBtn.textContent = '✓ Copied';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1800);
          });
        };
      } else {
        copyBtn.classList.remove('visible');
      }

      // Stop button — show when page translation is loading or info (click mode active)
      if (data.type === 'loading' || data.type === 'info') {
        stopBtn.classList.add('visible');
      } else {
        stopBtn.classList.remove('visible');
      }
    });

    stopBtn.addEventListener('click', () => {
      ipcRenderer.send('ext-action', { type: 'STOP_TRANSLATION' });
      ipcRenderer.send('hide-toast');
    });

    dismissBtn.addEventListener('click', () => {
      ipcRenderer.send('hide-toast');
    });
  </script>
</body>
</html>
