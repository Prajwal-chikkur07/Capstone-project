<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --surface: #FDFAF4;
      --surface-ink: #1C1917;
      --saffron: #E8820C;
      --border-warm: rgba(90,70,50,0.20);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      width: 180px; height: 40px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Idle pill ── */
    .pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border-warm);
      border-radius: 20px; padding: 8px 18px;
      cursor: pointer;
      box-shadow: 0 12px 48px rgba(28,25,23,0.20), 0 2px 8px rgba(28,25,23,0.10);
      transition: all 0.15s ease;
      -webkit-app-region: no-drag; user-select: none;
      font-family: 'DM Sans', sans-serif;
    }
    .pill:hover { transform: translateY(-1px); }

    .dots { display: flex; align-items: center; gap: 4px; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--saffron);
    }

    /* ── Recording pill ── */
    .rec-pill {
      display: none;
      align-items: center; gap: 8px;
      background: var(--surface-ink); border: 1px solid var(--surface-ink);
      border-radius: 20px; padding: 7px 12px;
      box-shadow: 0 12px 48px rgba(28,25,23,0.20), 0 2px 8px rgba(28,25,23,0.10);
      -webkit-app-region: no-drag; user-select: none;
      font-family: 'DM Sans', sans-serif;
    }

    /* animated dots */
    .rec-dots { display: flex; align-items: center; gap: 3px; }
    .rec-dot {
      width: 5px; height: 5px; border-radius: 50%; background: #fff;
      animation: bounce 1.1s ease-in-out infinite;
    }
    .rec-dot:nth-child(1) { animation-delay: 0s; }
    .rec-dot:nth-child(2) { animation-delay: 0.18s; }
    .rec-dot:nth-child(3) { animation-delay: 0.36s; }
    .rec-dot:nth-child(4) { animation-delay: 0.54s; }
    .rec-dot:nth-child(5) { animation-delay: 0.72s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scaleY(1); opacity: 0.5; }
      40%            { transform: scaleY(1.8); opacity: 1; }
    }

    /* icon buttons inside rec pill */
    .rec-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .rec-btn:hover { opacity: 0.75; transform: translateY(-1px); }
    .rec-btn.cancel { background: rgba(255,255,255,0.15); color: #fff; }
    .rec-btn.stop   { background: #fff; color: #111; }
  </style>
</head>
<body>
  <!-- Idle state -->
  <div class="pill" id="pill">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Recording state -->
  <div class="rec-pill" id="recPill">
    <!-- X cancel -->
    <button class="rec-btn cancel" id="cancelBtn">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- animated dots -->
    <div class="rec-dots">
      <div class="rec-dot"></div>
      <div class="rec-dot"></div>
      <div class="rec-dot"></div>
      <div class="rec-dot"></div>
      <div class="rec-dot"></div>
    </div>

    <!-- stop/submit -->
    <button class="rec-btn stop" id="stopBtn">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const pill    = document.getElementById('pill');
    const recPill = document.getElementById('recPill');
    let isRecording = false;

    // ── Drag on idle pill ──
    let isDragging = false, hasMoved = false;
    let dragStartX, dragStartY, winStartX, winStartY;
    let hoverTimer = null;

    pill.addEventListener('mousedown', async (e) => {
      isDragging = true; hasMoved = false;
      dragStartX = e.screenX; dragStartY = e.screenY;
      const pos = await ipcRenderer.invoke('get-bubble-pos');
      winStartX = pos.x; winStartY = pos.y;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.screenX - dragStartX, dy = e.screenY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
      ipcRenderer.send('bubble-drag', { x: winStartX + dx, y: winStartY + dy });
    });
    window.addEventListener('mouseup', () => {
      if (isDragging && !hasMoved) ipcRenderer.send('bubble-clicked');
      isDragging = false;
    });

    // ── Hover hint ──
    pill.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(() => {
        ipcRenderer.send('show-bubble-hint', { message: 'Click or hold fn to record' });
      }, 300);
    });
    pill.addEventListener('mouseleave', () => {
      if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
      ipcRenderer.send('hide-bubble-hint');
    });

    // ── Recording controls ──
    document.getElementById('cancelBtn').addEventListener('click', () => {
      ipcRenderer.send('cancel-recording');
    });
    document.getElementById('stopBtn').addEventListener('click', () => {
      ipcRenderer.send('stop-recording-ipc');
    });

    // ── State sync ──
    ipcRenderer.on('recording-state', (_, recording) => {
      isRecording = recording;
      pill.style.display    = recording ? 'none'  : 'flex';
      recPill.style.display = recording ? 'flex'  : 'none';
    });
  </script>
</body>
</html>
