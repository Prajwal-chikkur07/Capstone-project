<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      overflow: hidden;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    #bubble {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      user-select: none;
      position: relative;
    }

    #bubble:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    }

    #bubble:active {
      transform: scale(0.93);
    }

    #bubble.active {
      background: #10b981;
      box-shadow: 0 4px 20px rgba(16,185,129,0.5), 0 0 0 4px rgba(16,185,129,0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(16,185,129,0.5), 0 0 0 4px rgba(16,185,129,0.2); }
      50%       { box-shadow: 0 4px 24px rgba(16,185,129,0.6), 0 0 0 8px rgba(16,185,129,0.08); }
    }

    img {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      pointer-events: none;
    }

    #play-icon {
      color: white;
      font-size: 18px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="bubble">
    <span id="play-icon">▶︎</span>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const bubble = document.getElementById('bubble');
    let isDragging = false;
    let hasMoved = false;
    let startX, startY, winStartX, winStartY;

    // Click = toggle panel
    bubble.addEventListener('click', () => {
      if (!hasMoved) ipcRenderer.send('toggle-panel');
    });

    // Drag to reposition bubble anywhere on screen
    bubble.addEventListener('mousedown', (e) => {
      isDragging = true;
      hasMoved = false;
      startX = e.screenX;
      startY = e.screenY;

      // Get current window position via IPC
      ipcRenderer.invoke('get-bubble-pos').then(({ x, y }) => {
        winStartX = x;
        winStartY = y;
      });

      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.screenX - startX;
      const dy = e.screenY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
      ipcRenderer.send('bubble-drag', { x: winStartX + dx, y: winStartY + dy });
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    // Active state from main
    ipcRenderer.on('panel-state', (e, isOpen) => {
      bubble.classList.toggle('active', isOpen);
    });
  </script>
</body>
</html>
