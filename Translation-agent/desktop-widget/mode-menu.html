<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      padding: 8px;
    }
    .menu {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .option {
      border: none;
      background: transparent;
      color: #333;
      height: 42px;
      padding: 0 14px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.12s ease;
      font-family: inherit;
    }
    .option:hover { background: #f5f5f5; color: #111; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #111;
    }
    .arrow { margin-left: auto; color: #ccc; font-size: 14px; }
  </style>
</head>
<body>
  <div class="menu">
    <button class="option" id="nativeToEnglish">
      <span class="dot"></span>
      Native to English
      <span class="arrow">›</span>
    </button>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('nativeToEnglish').addEventListener('click', () => {
      ipcRenderer.send('select-mode', 'nativeToEnglish');
    });
  </script>
</body>
</html>
